<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f4f8; min-height: 100vh; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  /* Tampilkan scrollbar untuk area kanban */
  .kanban-wrap::-webkit-scrollbar { height: 7px; display:block; }
  .kanban-wrap::-webkit-scrollbar-track { background:#e2e8f0; border-radius:4px; }
  .kanban-wrap::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:4px; }
  .kanban-wrap::-webkit-scrollbar-thumb:hover { background:#64748b; }
  .kanban-col-body::-webkit-scrollbar { width: 4px; display:block; }
  .kanban-col-body::-webkit-scrollbar-track { background:#f1f5f9; }
  .kanban-col-body::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:2px; }
  input, select, textarea, button { font-family: inherit; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
  .sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; padding: 20px 18px 40px; max-height: 92vh; overflow-y: auto; }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .btn-primary { width: 100%; padding: 14px; background: #0d6b62; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .field-label { font-size: 13px; font-weight: 600; color: #475569; display: block; margin-bottom: 6px; }
  .field-input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color .15s; background: #fff; }
  .field-input:focus { border-color: #0d6b62; }
  .fab { position: fixed; bottom: 24px; right: 18px; width: 56px; height: 56px; border-radius: 50%; background: #0d6b62; color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(13,107,98,0.45); display: flex; align-items: center; justify-content: center; z-index: 300; line-height: 1; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  .kanban-wrap { overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; padding:12px 14px 10px; scrollbar-width:thin; scrollbar-color:#94a3b8 #e2e8f0; flex:1; min-height:0; box-sizing:border-box; }
  .kanban-board { display:inline-flex; gap:10px; height:100%; box-sizing:border-box; }
  .kanban-col { width:300px; flex-shrink:0; display:flex; flex-direction:column; border-radius:12px; overflow:hidden; background:#e8edf2; border:1px solid #d1d9e0; height:100%; box-sizing:border-box; }
  @media(min-width:640px){ .kanban-col { width:340px; } }
  .kanban-col-hdr { padding:10px 12px; display:flex; justify-content:space-between; align-items:center; }
  .kanban-col-hdr .hdr-title { font-size:12px; font-weight:700; }
  .kanban-col-hdr .hdr-count { font-size:12px; font-weight:800; min-width:20px; text-align:center; }
  .kanban-col-body { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:6px; min-height:0; scrollbar-width:thin; scrollbar-color:#b0bec5 #e8edf2; }
  .kcard { background:#fff; border-radius:10px; padding:10px 11px; cursor:pointer; border:1px solid #e2e8f0; box-shadow:0 1px 3px rgba(0,0,0,.07); transition:box-shadow .15s, transform .1s; }
  .kcard:hover { box-shadow:0 3px 8px rgba(0,0,0,.12); transform:translateY(-1px); }
  .kcard:active { box-shadow:0 0 0 2px #0d6b62; transform:scale(.98); }
  .kcard-name { font-size:13px; font-weight:700; color:#1e293b; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .kcard-dates { display:flex; flex-direction:column; gap:2px; margin-bottom:4px; }
  .kcard-dates span { font-size:11px; color:#64748b; }
  .kcard-badge { display:inline-flex; align-items:center; padding:2px 7px; border-radius:20px; font-size:10px; font-weight:700; margin-top:3px; }
  .kcard-accel { font-size:10px; color:#7c3aed; margin-top:3px; }
  .kanban-empty { text-align:center; padding:20px 8px; color:#cbd5e1; font-size:12px; }
  .order-card { background:#fff; border-radius:14px; overflow:hidden; cursor:pointer; border:1px solid #f1f5f9; box-shadow:0 1px 4px rgba(0,0,0,.05); transition:transform .15s,box-shadow .15s; }
  .order-card:active { transform:scale(.97); }
  .card-thumb { width:100%; height:95px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .card-thumb img { width:100%; height:100%; object-fit:cover; }
  .stage-badge { position:absolute; bottom:5px; left:6px; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; white-space:nowrap; }
  .photo-count { position:absolute; top:5px; right:5px; background:rgba(0,0,0,.5); color:#fff; font-size:10px; font-weight:700; border-radius:4px; padding:2px 5px; }
  .card-body { padding:9px 10px 10px; }
  .card-name { font-size:13px; font-weight:700; color:#1e293b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:1px; }
  .card-sub { font-size:11px; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
  .card-date { font-size:10px; color:#94a3b8; margin-bottom:6px; }
  .card-prog { display:flex; gap:2px; }
  .card-prog span { flex:1; height:3px; border-radius:2px; }
</style>
</head>

<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const STAGES = [
  { id: "masuk",     label: "Paket Masuk",  short: "Masuk",   emoji: "\uD83D\uDCE6", color: "#64748b", bg: "#f1f5f9" },
  { id: "formulasi", label: "Formulasi",    short: "Formula", emoji: "\uD83D\uDCCF", color: "#2563eb", bg: "#eff6ff" },
  { id: "dedel",     label: "Dedel",        short: "Dedel",   emoji: "\u2702\uFE0F", color: "#ea580c", bg: "#fff7ed" },
  { id: "jahit",     label: "Proses Jahit", short: "Jahit",   emoji: "\uD83E\uDDF5", color: "#7c3aed", bg: "#f5f3ff" },
  { id: "kirim",     label: "Dikirim",      short: "Kirim",   emoji: "\uD83D\uDE9A", color: "#0891b2", bg: "#ecfeff" },
  { id: "selesai",   label: "Selesai",      short: "Selesai", emoji: "\u2705",        color: "#059669", bg: "#f0fdf4" },
];

// Handle legacy stage id "cek_ukur" from old sheet data
function normalizeStage(s) { return s === "cek_ukur" ? "formulasi" : (s||"masuk"); }

const ROLES = {
  owner:      { id:"owner",      label:"Owner",       emoji:"👑", color:"#1e3a5f", pinRequired:true  },
  pic_vermak: { id:"pic_vermak", label:"PIC Vermak",  emoji:"📋", color:"#0d6b62", pinRequired:true  },
  formulator: { id:"formulator", label:"Formulator",  emoji:"📐", color:"#2563eb", pinRequired:true  },
  penjahit:   { id:"penjahit",   label:"Penjahit",    emoji:"🧵", color:"#ea580c", pinRequired:true  },
  kurir:      { id:"kurir",      label:"Kurir",       emoji:"🚚", color:"#0891b2", pinRequired:true  },
  viewer:     { id:"viewer",     label:"Viewer",      emoji:"👁️", color:"#64748b", pinRequired:false },
};

// Hak akses per role
function canAddOrder(role)    { return role==="owner" || role==="pic_vermak"; }
function canAddPhoto(role)    { return role==="owner" || role==="pic_vermak"; }
function canEditCatatan(role, stage) {
  if (role==="owner" || role==="pic_vermak") return true;
  if (role==="formulator") return stage==="formulasi" || stage==="cek_ukur";
  return false;
}
function canEditUkuran(role, stage) {
  if (role==="owner" || role==="pic_vermak") return true;
  if (role==="formulator") return stage==="formulasi" || stage==="cek_ukur";
  return false;
}
function canAdvanceStage(role, stage) {
  if (role==="owner" || role==="pic_vermak") return true;
  if (role==="formulator") return stage==="formulasi" || stage==="cek_ukur"; // lanjut ke dedel
  if (role==="penjahit")   return stage==="jahit";
  if (role==="kurir")      return stage==="kirim";
  return false;
}

const JENIS_PAKAIAN = ["Gamis","Kemeja","Celana","Abaya","Lainnya"];
const JENIS_VERMAK  = ["Potong Panjang","Kecilkan Badan","Besarkan Badan","Tambah Kancing","Lainnya"];

function getPhotos(photoUrl) {
  if (!photoUrl) return [];
  return String(photoUrl).split("|").map(s => s.trim())
    .filter(s => s && s.startsWith("http"));
}

function getAgeDays(createdAt) {
  if (!createdAt) return 0;
  const d = isNaN(Number(createdAt)) ? new Date(createdAt) : new Date(Number(createdAt));
  if (isNaN(d.getTime())) return 0;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function getAgeStyle(days) {
  if (days >= 7)  return { bg:"#fef2f2", color:"#dc2626", text:`${days} hari ⚠️`, urgent:true };
  if (days >= 5)  return { bg:"#fffbeb", color:"#d97706", text:`${days} hari`, urgent:false };
  if (days >= 3)  return { bg:"#f8fafc", color:"#64748b", text:`${days} hari`, urgent:false };
  return null;
}

function getDeadlineDate(createdAt, percepatan) {
  if (!createdAt) return null;
  const d = isNaN(Number(createdAt)) ? new Date(createdAt) : new Date(Number(createdAt));
  if (isNaN(d.getTime())) return null;
  const days = 7 - (Number(percepatan)||0);
  return new Date(d.getTime() + days * 86400000);
}

function getDeadlineStatus(deadlineDate) {
  if (!deadlineDate) return null;
  const diff = deadlineDate.getTime() - Date.now();
  const days = Math.ceil(diff / 86400000);
  if (days < 0)  return { text:`Terlambat ${Math.abs(days)} hari`, color:"#dc2626", bg:"#fef2f2", urgent:true };
  if (days === 0) return { text:"Hari ini!",                   color:"#ea580c", bg:"#fff7ed", urgent:false };
  if (days <= 2) return { text:`${days} hari lagi`,            color:"#d97706", bg:"#fffbeb", urgent:false };
  return null;
}

function formatShortDate(d) {
  if (!d) return "-";
  return d.toLocaleDateString("id-ID", { day:"2-digit", month:"short" });
}


function formatDate(ts) {
  if (!ts) return "-";
  const d = (ts instanceof Date) ? ts : (isNaN(Number(ts)) ? new Date(ts) : new Date(Number(ts)));
  if (!d || isNaN(d.getTime())) return "-";
  return d.toLocaleDateString("id-ID",
    { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
}

/* ── Setup Screen ── */
/* ── PIN Numpad ── */
function PinModal({ roleId, onSuccess, onCancel }) {
  const role = ROLES[roleId];
  const [pin, setPin] = useState("");
  const [shake, setShake] = useState(false);

  const PIN_MAX = 6;
  const getStored = () => { try { return localStorage.getItem("vt_pin_"+roleId) || (roleId==="owner" ? "052731" : roleId==="pic_vermak" ? "1234" : "5678"); } catch{return "5678";} };
  const tryPin = (p) => {
    const stored = getStored();
    if (p === stored) { onSuccess(); return; }
    if (p.length >= PIN_MAX || p.length >= stored.length) {
      setShake(true); setPin(""); setTimeout(() => setShake(false), 500);
    }
  };
  const press = d => {
    if (pin.length >= PIN_MAX) return;
    const np = pin + d;
    setPin(np);
    const stored = getStored();
    if (np === stored) { setTimeout(() => onSuccess(), 150); }
    else if (np.length >= Math.max(PIN_MAX, stored.length)) { setTimeout(() => tryPin(np), 150); }
  };
  const del = () => setPin(p => p.slice(0,-1));

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onCancel()}>
      <div className="sheet" style={{ textAlign:"center" }}>
        <div style={{ fontSize:28, marginBottom:4 }}>{role.emoji}</div>
        <div style={{ fontSize:17, fontWeight:800, color:"#1e293b", marginBottom:2 }}>{role.label}</div>
        <div style={{ fontSize:13, color:"#94a3b8", marginBottom:20 }}>Masukkan PIN untuk login</div>

        {/* PIN dots - dynamic length up to 6 */}
        <div style={{ display:"flex", justifyContent:"center", gap:12, marginBottom:24,
          animation: shake ? "shake .4s ease" : "none" }}>
          {[0,1,2,3,4,5].map(i => (
            <div key={i} style={{ width:15, height:15, borderRadius:"50%",
              background: i < pin.length ? role.color : "#e2e8f0",
              transition:"background .1s", opacity: i >= PIN_MAX ? 0.15 : 1 }} />
          ))}
        </div>

        {/* Numpad */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, maxWidth:240, margin:"0 auto 16px" }}>
          {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i) => (
            <button key={i} onClick={() => d==="⌫" ? del() : d!=="" ? press(String(d)) : null}
              style={{ padding:"16px 0", fontSize: d==="⌫" ? 18 : 20, fontWeight:700,
                background: d==="" ? "transparent" : "#f8fafc",
                border: d==="" ? "none" : "1.5px solid #e2e8f0",
                borderRadius:12, cursor: d==="" ? "default" : "pointer",
                color: d==="⌫" ? "#64748b" : "#1e293b" }}>
              {d}
            </button>
          ))}
        </div>
        {pin.length >= 4 && (
          <button onClick={() => tryPin(pin)} style={{ marginBottom:8, padding:"10px 32px",
            background: ROLES[roleId]?.color || "#0d6b62", color:"#fff", border:"none",
            borderRadius:10, fontSize:14, fontWeight:700, cursor:"pointer" }}>
            ✓ Masuk
          </button>
        )}
        <button onClick={onCancel} style={{ background:"none", border:"none", color:"#94a3b8", fontSize:13, cursor:"pointer" }}>
          Batal
        </button>
      </div>
    </div>
  );
}

/* ── Settings Modal (Owner only) ── */
function SettingsModal({ onClose, onResetUrl }) {
  const [pins, setPins] = useState({
    owner:      (() => { try { return localStorage.getItem("vt_pin_owner")||"052731"; } catch{return "052731";} })(),
    pic_vermak: (() => { try { return localStorage.getItem("vt_pin_pic_vermak")||"1234"; } catch{return "1234";} })(),
    formulator: (() => { try { return localStorage.getItem("vt_pin_formulator")||"5678"; } catch{return "5678";} })(),
    penjahit:   (() => { try { return localStorage.getItem("vt_pin_penjahit")||"5678"; } catch{return "5678";} })(),
    pic_kirim:  (() => { try { return localStorage.getItem("vt_pin_pic_kirim")||"5678"; } catch{return "5678";} })(),
  });
  const savePin = () => {
    if (Object.values(pins).some(p => p.length < 4)) { alert("PIN minimal 4 angka"); return; }
    try { Object.entries(pins).forEach(([k,v]) => localStorage.setItem("vt_pin_"+k, v)); } catch{}
    alert("PIN berhasil disimpan!"); onClose();
  };
  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="sheet">

function KanbanCard({ order, onClick }) {
  const dl     = getDeadlineDate(order.createdAt, order.percepatan);
  const dlStat = getDeadlineStatus(dl);
  const created = (() => {
    if (!order.createdAt) return null;
    return isNaN(Number(order.createdAt)) ? new Date(order.createdAt) : new Date(Number(order.createdAt));
  })();
  return (
    <div className="kcard" onClick={() => onClick(order)}>
      <div className="kcard-name">{order.customerName}</div>
      <div className="kcard-dates">
        <span>📅 Masuk: {formatShortDate(created)}</span>
        <span style={{ color: dlStat ? dlStat.color : "#64748b", fontWeight: dlStat ? 700 : 400 }}>
          ⏰ Deadline: {formatShortDate(dl)}
        </span>
      </div>
      {dlStat && (
        <span className="kcard-badge" style={{ background:dlStat.bg, color:dlStat.color }}>

        <div className="kcard-accel">⚡ Percepatan {order.percepatan} hari</div>

  );
}

/* ── Kanban Board ── */
function KanbanBoard({ orders, onCardClick, search }) {
  const q = (search||"").toLowerCase();
  const filtered = q ? orders.filter(o =>
    (o.customerName||"").toLowerCase().includes(q) ||
    (o.jenisVermak||"").toLowerCase().includes(q) ||
    (o.jenisPakaian||"").toLowerCase().includes(q) ||
    (o.catatan||"").toLowerCase().includes(q)
  ) : orders;

  return (
    <div className="kanban-wrap">
      <div className="kanban-board">
        {STAGES.map(stage => {
          const cols = filtered.filter(o => normalizeStage(o.stage) === stage.id)
            .sort((a,b) => {
              const da = getDeadlineDate(a.createdAt, a.percepatan);
              const db = getDeadlineDate(b.createdAt, b.percepatan);
              if (!da || !db) return 0;
              return da.getTime() - db.getTime(); // deadline terdekat di atas
            });
          return (
            <div key={stage.id} className="kanban-col">
              <div className="kanban-col-hdr" style={{ background: stage.color+"22" }}>
                <span className="hdr-title" style={{ color:stage.color }}>
                  {stage.emoji} {stage.label}
                </span>
                <span className="hdr-count" style={{ background:stage.color+"22", color:stage.color, borderRadius:20, padding:"1px 8px" }}>
                  {cols.length}
                </span>
              </div>
              <div className="kanban-col-body">
                {cols.length === 0
                  ? <div className="kanban-empty">— kosong —</div>
                  : cols.map(o => <KanbanCard key={o.orderId} order={o} onClick={onCardClick} />)
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Photo Lightbox ── */
function PhotoLightbox({ photos, startIndex, onClose }) {
  const [idx,   setIdx]   = useState(startIndex || 0);
  const [scale, setScale] = useState(1);
  const [pos,   setPos]   = useState({ x:0, y:0 });
  const wrapRef  = useRef();
  const lastTap  = useRef(0);
  const pinchRef = useRef(null);
  const panRef   = useRef(null);
  const rafRef   = useRef(null);

  const clamp = (val, min, max) => Math.min(max, Math.max(min, val));

  const resetZoom = () => { setScale(1); setPos({ x:0, y:0 }); };
  const goTo = (n) => { setIdx(n); resetZoom(); };

  // Apply transform via RAF to avoid excessive re-renders
  const pendingTransform = useRef({ scale:1, x:0, y:0 });
  const [, forceRender] = useState(0);
  const flushTransform = () => {
    setScale(pendingTransform.current.scale);
    setPos({ x: pendingTransform.current.x, y: pendingTransform.current.y });
  };

  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;

    const getScale = () => pendingTransform.current.scale;

    const onStart = (e) => {
      if (e.touches.length === 2) {
        const t = e.touches;
        pinchRef.current = {
          dist:  Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY),
          scale: pendingTransform.current.scale,
        };
        panRef.current = null;
      } else if (e.touches.length === 1) {
        const now = Date.now();
        if (now - lastTap.current < 280) {
          // double tap
          if (pendingTransform.current.scale > 1) {
            pendingTransform.current = { scale:1, x:0, y:0 };
          } else {
            pendingTransform.current = { scale:2.5, x:0, y:0 };
          }
          flushTransform();
          lastTap.current = 0;
          return;
        }
        lastTap.current = now;
        pinchRef.current = null;
        panRef.current = {
          sx: e.touches[0].clientX,
          sy: e.touches[0].clientY,
          px: pendingTransform.current.x,
          py: pendingTransform.current.y,
        };
      }
    };

    const onMove = (e) => {
      e.preventDefault();
      if (e.touches.length === 2 && pinchRef.current) {
        const t = e.touches;
        const dist = Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
        const newScale = clamp(pinchRef.current.scale * (dist / pinchRef.current.dist), 1, 6);
        pendingTransform.current.scale = newScale;
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        rafRef.current = requestAnimationFrame(flushTransform);
      } else if (e.touches.length === 1 && panRef.current && pendingTransform.current.scale > 1) {
        const s   = pendingTransform.current.scale;
        const dx  = e.touches[0].clientX - panRef.current.sx;
        const dy  = e.touches[0].clientY - panRef.current.sy;
        const maxX = (s-1) * (el.offsetWidth  / 2);
        const maxY = (s-1) * (el.offsetHeight / 2);
        pendingTransform.current.x = clamp(panRef.current.px + dx, -maxX, maxX);
        pendingTransform.current.y = clamp(panRef.current.py + dy, -maxY, maxY);
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        rafRef.current = requestAnimationFrame(flushTransform);
      }
    };

    const onEnd = () => {
      pinchRef.current = null;
      panRef.current   = null;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      flushTransform();
    };

    el.addEventListener("touchstart", onStart, { passive: false });
    el.addEventListener("touchmove",  onMove,  { passive: false });
    el.addEventListener("touchend",   onEnd);
    return () => {
      el.removeEventListener("touchstart", onStart);
      el.removeEventListener("touchmove",  onMove);
      el.removeEventListener("touchend",   onEnd);
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [idx]);

  // Sync pendingTransform ref with state
  useEffect(() => {
    pendingTransform.current = { scale, x: pos.x, y: pos.y };
  }, [scale, pos]);

  const imgStyle = {
    maxWidth: "100%", maxHeight: "82vh", objectFit: "contain",
    transform: `scale(${scale}) translate(${pos.x/scale}px, ${pos.y/scale}px)`,
    transition: pinchRef.current || panRef.current ? "none" : "transform .2s ease",
    userSelect: "none", touchAction: "none", display: "block",
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.95)", zIndex:1000,
      display:"flex", flexDirection:"column" }}>

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
        padding:"13px 16px", background:"rgba(0,0,0,.35)", flexShrink:0 }}>
        <div style={{ color:"#fff", fontSize:13, fontWeight:600 }}>
          {idx===0 ? "📦 Foto Paket" : `📷 Foto ${idx+1}`}
          <span style={{ opacity:.45, marginLeft:8 }}>{idx+1}/{photos.length}</span>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          {scale > 1 && (
            <button onClick={resetZoom} style={{ background:"rgba(255,255,255,.15)", border:"none",
              borderRadius:8, padding:"5px 12px", color:"#fff", cursor:"pointer", fontSize:12 }}>
              Reset
            </button>
          )}
          <button onClick={onClose} style={{ background:"rgba(255,255,255,.15)", border:"none",
            borderRadius:8, padding:"5px 14px", color:"#fff", cursor:"pointer", fontSize:18 }}>✕</button>
        </div>
      </div>

      <div ref={wrapRef} style={{ flex:1, display:"flex", alignItems:"center",
        justifyContent:"center", overflow:"hidden", touchAction:"none" }}>
        <img src={photos[idx]} alt="" style={imgStyle} draggable={false} />
      </div>

      {photos.length > 1 && (
        <div style={{ display:"flex", justifyContent:"center", alignItems:"center",
          gap:12, padding:"14px 0", flexShrink:0 }}>
          <button onClick={() => goTo((idx-1+photos.length)%photos.length)}
            style={{ background:"rgba(255,255,255,.18)", border:"none", borderRadius:"50%",
              width:42, height:42, color:"#fff", fontSize:22, cursor:"pointer" }}>‹</button>
          <div style={{ display:"flex", gap:6 }}>
            {photos.map((_,i) => (
              <div key={i} onClick={() => goTo(i)} style={{ width:7, height:7, borderRadius:"50%",
                background: i===idx ? "#fff" : "rgba(255,255,255,.3)", cursor:"pointer" }} />
            ))}
          </div>
          <button onClick={() => goTo((idx+1)%photos.length)}
            style={{ background:"rgba(255,255,255,.18)", border:"none", borderRadius:"50%",
              width:42, height:42, color:"#fff", fontSize:22, cursor:"pointer" }}>›</button>
        </div>
      )}
      <div style={{ textAlign:"center", paddingBottom:10, color:"rgba(255,255,255,.3)", fontSize:10 }}>
        Double tap · Pinch zoom · Geser untuk pan
      </div>
    </div>
  );
}

            const done   = i < idx;
            const active = i === idx;
            return (
              <div key={s.id} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
                <div style={{
                  width:34, height:34, borderRadius:"50%", flexShrink:0, fontSize: active?16:13,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  background: active ? s.color : done ? s.bg : "#f1f5f9",
                  border: active ? "none" : done ? `2px solid ${s.color}` : "1.5px solid #e2e8f0",
                  color: active ? "#fff" : done ? s.color : "#cbd5e1", fontWeight:700,
                }}>
                  {done ? "✓" : s.emoji}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight: active?700:500, color: active?"#1e293b": i>idx?"#94a3b8":"#64748b" }}>
                    {s.label}
                  </div>
                  {active && <div style={{ fontSize:11, color:s.color, fontWeight:600, marginTop:1 }}>● Sedang diproses</div>}
                  {done   && <div style={{ fontSize:11, color:"#94a3b8", marginTop:1 }}>Selesai</div>}
                </div>
              </div>
            );
          })}
        </div>

        {next && canAdvanceStage(role, order.stage) && (
          <button className="btn-primary"
            onClick={() => {
              if (confirm(`Lanjutkan paket ${order.customerName} ke tahap "${next.label}"?`)) {
                onUpdateStage(order.orderId, next.id);
              }
            }}
            disabled={updating} style={{ background: updating ? "#94a3b8" : next.color }}>
            {updating ? "⏳ Memperbarui..." : `${next.emoji} Lanjut ke ${next.label}`}
          </button>
        )}
        {!next && (canAddOrder(role)) && (
          <div style={{ textAlign:"center", padding:16, background:"#f0fdf4", borderRadius:12,
            color:"#059669", fontWeight:700, fontSize:15 }}>
            ✅ Selesai!
          </div>
        )}
        {next && !canAdvanceStage(role, order.stage) && role !== "viewer" && (
          <div style={{ textAlign:"center", padding:12, background:"#f8fafc", borderRadius:12,
            color:"#94a3b8", fontSize:13 }}>
            🔒 Tahap ini dikendalikan oleh role lain
          </div>
        )}
      </div>
      {lightbox && <PhotoLightbox photos={lightbox.photos} startIndex={lightbox.startIndex} onClose={() => setLightbox(null)} />}
    </div>
  );
}

/* ── Archive Modal ── */
function ArchiveModal({ onClose }) {
  const [orders,    setOrders]    = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [search,    setSearch]    = useState("");
  const [selected,  setSelected]  = useState(null);
  const [archiving, setArchiving] = useState(false);

  const fetchArchive = async () => {
    setLoading(true);
    try {
      const { data, error } = await sb.from("orders").select("*")
        .eq("archived", true).order("archived_at", {ascending:false});
      if (error) throw error;
      setOrders((data||[]).map(rowToOrder));
    } catch(e) { console.log(e); }
    finally { setLoading(false); }
  };

  const manualArchive = async () => {
    if (!confirm("Arsipkan semua order Selesai yang sudah lebih dari 7 hari?")) return;
    setArchiving(true);
    try {
      const { data:all } = await sb.from("orders").select("order_id,stage,tgl_selesai,tgl_update").eq("archived",false);
      const ids = (all||[]).filter(o => {
        if (o.stage !== "selesai") return false;
        return (Date.now() - new Date(o.tgl_selesai||o.tgl_update).getTime()) > 7*86400000;
      }).map(o => o.order_id);
      if (!ids.length) { alert("Tidak ada order yang perlu diarsipkan saat ini."); setArchiving(false); return; }
      const { error } = await sb.from("orders").update({ archived:true, archived_at:new Date().toISOString() }).in("order_id", ids);
      if (error) throw error;
      alert(`✅ ${ids.length} order berhasil diarsipkan!`);
      await fetchArchive();
    } catch(e) { alert("Error: " + e.message); }
    setArchiving(false);
  };

  useEffect(() => { fetchArchive(); }, []);

  const sl = search.toLowerCase();
  const filtered = orders.filter(o =>
    !sl ||
    String(o.customerName||"").toLowerCase().includes(sl) ||
    String(o.jenisVermak||"").toLowerCase().includes(sl) ||
    String(o.orderId||"").toLowerCase().includes(sl)
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"#f5f3ff", zIndex:600, display:"flex", flexDirection:"column" }}>
            {/* Header */}
      <div style={{ background:"#7c3aed", color:"#fff", padding:"13px 18px", boxShadow:"0 2px 10px rgba(124,58,237,.3)", flexShrink:0 }}>
        <div style={{ maxWidth:600, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:17, fontWeight:800 }}>📦 Arsip Order</div>
            <div style={{ fontSize:11, opacity:.75 }}>{orders.length} order diarsipkan</div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={manualArchive} disabled={archiving} style={{ background:"rgba(255,255,255,.15)",
              border:"none", borderRadius:8, padding:"8px 12px", color:"#fff", cursor:"pointer", fontSize:12, fontWeight:700 }}>
              {archiving ? "⏳" : "🗂️ Arsipkan Sekarang"}
            </button>
            <button onClick={onClose} style={{ background:"rgba(255,255,255,.15)", border:"none",
              borderRadius:8, padding:"8px 12px", color:"#fff", cursor:"pointer", fontSize:15 }}>✕</button>
          </div>
        </div>
      </div>

      {/* Search */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e9d5ff", padding:"10px 18px", flexShrink:0 }}>
        <div style={{ maxWidth:600, margin:"0 auto", position:"relative" }}>
          <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#94a3b8" }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Cari di arsip..." style={{ width:"100%", padding:"9px 12px 9px 36px",
              border:"1.5px solid #e9d5ff", borderRadius:10, fontSize:13, outline:"none", boxSizing:"border-box" }} />
        </div>
      </div>

      {/* Info banner */}
      <div style={{ background:"#ede9fe", padding:"10px 18px", borderBottom:"1px solid #ddd6fe", flexShrink:0 }}>
        <div style={{ maxWidth:600, margin:"0 auto", fontSize:12, color:"#6d28d9" }}>
          ℹ️ Order berstatus <b>Selesai</b> yang sudah lebih dari <b>7 hari</b> otomatis dipindahkan ke sini setiap malam.
          Data tetap tersimpan di Google Sheets tab <b>"Arsip"</b>.
        </div>
      </div>

      {/* List */}
      <div style={{ flex:1, overflowY:"auto", padding:"14px 18px" }}>
        <div style={{ maxWidth:600, margin:"0 auto" }}>
          {loading && (
            <div style={{ textAlign:"center", padding:"60px 0", color:"#94a3b8" }}>
              <div style={{ fontSize:32, marginBottom:8 }}>⏳</div>
              <div style={{ fontWeight:600 }}>Memuat arsip...</div>
            </div>
          )}
          {!loading && filtered.length === 0 && (
            <div style={{ textAlign:"center", padding:"60px 0", color:"#94a3b8" }}>
              <div style={{ fontSize:44, marginBottom:10 }}>📭</div>
              <div style={{ fontWeight:700, color:"#64748b" }}>{search ? "Tidak ada hasil" : "Arsip masih kosong"}</div>
              <div style={{ fontSize:13, marginTop:5 }}>Order Selesai yang sudah 7+ hari akan muncul di sini</div>
            </div>
          )}
          {filtered.map(o => (
            <div key={o.orderId} onClick={() => setSelected(o)} style={{ background:"#fff", borderRadius:14,
              padding:14, marginBottom:10, cursor:"pointer", border:"1px solid #ede9fe",
              boxShadow:"0 1px 4px rgba(0,0,0,0.05)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", gap:10 }}>
                <div>
                  <div style={{ fontWeight:700, fontSize:15, color:"#1e293b" }}>{o.customerName}</div>
                  <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{o.jenisPakaian} · {o.jenisVermak}</div>
                </div>
                {getPhotos(o.photoUrl)[0] && (
                  <img src={getPhotos(o.photoUrl)[0]} alt="" style={{ width:44, height:44, borderRadius:8, objectFit:"cover", flexShrink:0, border:"1.5px solid #ede9fe" }} />
                )}
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10 }}>
                <span style={{ background:"#ede9fe", color:"#7c3aed", fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20 }}>
                  📦 Diarsipkan
                </span>
                <span style={{ fontSize:11, color:"#94a3b8" }}>{formatDate(o.archivedAt || o.updatedAt)}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {selected && (
        <div className="overlay" onClick={e => e.target===e.currentTarget && setSelected(null)}>
          <div className="sheet">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <div>
                <h2 style={{ fontSize:18, fontWeight:800, color:"#1e293b" }}>{selected.customerName}</h2>
                <div style={{ fontSize:11, color:"#94a3b8", marginTop:2 }}>{selected.orderId}</div>
              </div>
              <button onClick={() => setSelected(null)} style={{ background:"#f1f5f9", border:"none", borderRadius:8, padding:"6px 12px", cursor:"pointer", color:"#64748b", fontSize:15 }}>✕</button>
            </div>
            {getPhotos(selected.photoUrl).length > 0 && (
              <div style={{ display:"flex", gap:8, overflowX:"auto", marginBottom:14 }}>
                {getPhotos(selected.photoUrl).map((url,i) => (
                  <img key={i} src={url} alt="" style={{ width:130, height:130, objectFit:"cover", borderRadius:12, flexShrink:0, border:"1.5px solid #f1f5f9" }} />
                ))}
              </div>
            )}
            <div style={{ background:"#f8fafc", borderRadius:12, padding:"14px 16px", marginBottom:12 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                {[["Jenis Pakaian",selected.jenisPakaian],["Jenis Vermak",selected.jenisVermak],
                  ["Tgl. Masuk",formatDate(selected.createdAt)],["Diarsipkan",formatDate(selected.archivedAt||selected.updatedAt)]
                ].map(([l,v]) => (
                  <div key={l}>
                    <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>{l}</div>
                    <div style={{ fontSize:13, color:"#1e293b", fontWeight:600, marginTop:3 }}>{v||"-"}</div>
                  </div>
                ))}
              </div>
              {selected.catatan && <div style={{ marginTop:12, paddingTop:12, borderTop:"1px solid #e2e8f0" }}>
                <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>Catatan Vermak</div>
                <div style={{ fontSize:13, color:"#1e293b", marginTop:3 }}>{selected.catatan}</div>
              </div>}
              {selected.ukuran && <div style={{ marginTop:12, paddingTop:12, borderTop:"1px solid #e2e8f0" }}>
                <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>Ukuran</div>
                <div style={{ fontSize:13, color:"#1e293b", marginTop:3, whiteSpace:"pre-wrap", fontFamily:"monospace" }}>{selected.ukuran}</div>
              </div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  jenisVermak:r.jenis_vermak, catatan:r.catatan||"", ukuran:r.ukuran||"",

  photoUrl:r.photo_url||"", createdAt:r.tgl_masuk, updatedAt:r.tgl_update,
  tglFormulasi:r.tgl_formulasi, tglDedel:r.tgl_dedel, tglJahit:r.tgl_jahit,
  tglKirim:r.tgl_kirim, tglSelesai:r.tgl_selesai, archivedAt:r.archived_at,
});
const STAGE_TS = {formulasi:"tgl_formulasi",dedel:"tgl_dedel",jahit:"tgl_jahit",kirim:"tgl_kirim",selesai:"tgl_selesai"};
const uploadPhoto = async (b64, orderId) => {
  const arr = new Uint8Array(atob(b64).split("").map(c=>c.charCodeAt(0)));
  const blob = new Blob([arr], {type:"image/jpeg"});
  const path = `${orderId}/${Date.now()}.jpg`;
  const { error } = await sb.storage.from("photos").upload(path, blob, {contentType:"image/jpeg"});
  if (error) throw error;
  return sb.storage.from("photos").getPublicUrl(path).data.publicUrl;
};

/* ── Main App ── */
function App() {
  const [role,setRole]           = useState(()=>{try{return localStorage.getItem("vt_role")||null;}catch{return null;}});
  const [orders,setOrders]       = useState([]);
  const [refreshing,setRefreshing] = useState(false);
  const [showAdd,setShowAdd]     = useState(false);
  const [selected,setSelected]   = useState(null);
  const [saving,setSaving]       = useState(false);
  const [updating,setUpdating]   = useState(false);
  const [lastSync,setLastSync]   = useState(null);
  const [showSettings,setShowSettings] = useState(false);
  const [showArchive,setShowArchive]   = useState(false);
  const [search,setSearch]       = useState("");
  const [fetchError,setFetchError] = useState("");

  const saveRole = r => {try{if(r)localStorage.setItem("vt_role",r);else localStorage.removeItem("vt_role");}catch{}setRole(r);};

  const fetchOrders = async (silent=false) => {
    if(!silent) setRefreshing(true);
    try {
      const {data,error} = await sb.from("orders").select("*").eq("archived",false).order("tgl_masuk",{ascending:false});
      if(error) throw error;
      setOrders(data.map(rowToOrder));
      setLastSync(new Date()); setFetchError("");
    } catch(e) { if(!silent) setFetchError("⚠️ Gagal memuat data — tap 🔄 untuk coba lagi"); }
    finally { setRefreshing(false); }
  };

  useEffect(()=>{
    if(!role) return;
    fetchOrders();
    const iv = setInterval(()=>fetchOrders(true),30000);
    return ()=>clearInterval(iv);
  },[role]);

  const handleAdd = async fd => {
    setSaving(true);
    try {
      const orderId = "VMK-"+Date.now();
      const days = 7-(Number(fd.percepatan)||0);
      const deadline = new Date(Date.now()+days*86400000).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric",timeZone:"Asia/Jakarta"});
      const {error} = await sb.from("orders").insert({
        order_id:orderId, customer_name:fd.customerName, jenis_pakaian:fd.jenisPakaian,
        jenis_vermak:fd.jenisVermak, catatan:fd.catatan||"", percepatan:Number(fd.percepatan)||0, stage:"masuk", photo_url:"",
      });
      if(error) throw error;
      notifPaketBaru(fd, deadline);
      await fetchOrders(); setShowAdd(false);
      if(fd.photo) {
        uploadPhoto(fd.photo, orderId).then(async url=>{
          await sb.from("orders").update({photo_url:url}).eq("order_id",orderId);
          fetchOrders(true);
        }).catch(e=>alert("Foto gagal upload: "+e.message+". Cek policy storage Supabase."));
      }
    } catch(e) { alert("Error: "+e.message); }
    finally { setSaving(false); }
  };

  const handleUpdateStage = async (orderId, newStage) => {
    setUpdating(true);
    try {
      const updates = {stage:newStage, tgl_update:new Date().toISOString()};
      if(STAGE_TS[newStage]) updates[STAGE_TS[newStage]] = new Date().toISOString();
      const {error} = await sb.from("orders").update(updates).eq("order_id",orderId);
      if(error) throw error;
      const order = orders.find(o=>o.orderId===orderId);
      if(order) notifUpdateStage(order.customerName,newStage,order.createdAt,order.percepatan);
      await fetchOrders(); setSelected(null);
    } catch(e) { alert("Error: "+e.message); }
    finally { setUpdating(false); }
  };

  const handleUpdateCustomerName = async (orderId,customerName) => {
    try {
      const {error} = await sb.from("orders").update({customer_name:customerName,tgl_update:new Date().toISOString()}).eq("order_id",orderId);
      if(error) throw error;
      await fetchOrders(); setSelected(prev=>prev?{...prev,customerName}:null);
    } catch(e) { alert("Error: "+e.message); }
  };
  const handleDeletePhoto = async (orderId,photoIndex) => {
    if(!confirm("Hapus foto ini?")) return;
    try {
      const {data} = await sb.from("orders").select("photo_url").eq("order_id",orderId).single();
      const photos = (data?.photo_url||"").split("|").filter(Boolean);
      const deletedUrl = photos[photoIndex];
      photos.splice(photoIndex,1);
      const newUrl = photos.join("|");
      const {error} = await sb.from("orders").update({photo_url:newUrl,tgl_update:new Date().toISOString()}).eq("order_id",orderId);
      if(error) throw error;
      // Hapus file dari Storage
      if(deletedUrl && deletedUrl.includes("/storage/v1/object/public/photos/")) {
        const path = deletedUrl.split("/storage/v1/object/public/photos/")[1];
        await sb.storage.from("photos").remove([path]);
      }
      await fetchOrders(); setSelected(prev=>prev?{...prev,photoUrl:newUrl}:null);
    } catch(e) { alert("Error: "+e.message); }
  };
  const handleUpdatePercepatan = async (orderId,percepatan) => {
    try {
      const {error} = await sb.from("orders").update({percepatan:Number(percepatan),tgl_update:new Date().toISOString()}).eq("order_id",orderId);
      if(error) throw error;
      await fetchOrders(); setSelected(prev=>prev?{...prev,percepatan}:null);
    } catch(e) { alert("Error: "+e.message); }
  };
  const handleUpdateUkuran = async (orderId,ukuran) => {
    try {
      const {error} = await sb.from("orders").update({ukuran,tgl_update:new Date().toISOString()}).eq("order_id",orderId);
      if(error) throw error;
      await fetchOrders(); setSelected(prev=>prev?{...prev,ukuran}:null);
    } catch(e) { alert("Error: "+e.message); }
  };
  const handleUpdateCatatan = async (orderId,catatan) => {
    try {
      const {error} = await sb.from("orders").update({catatan,tgl_update:new Date().toISOString()}).eq("order_id",orderId);
      if(error) throw error;
      await fetchOrders(); setSelected(prev=>prev?{...prev,catatan}:null);
    } catch(e) { alert("Error: "+e.message); }
  };
  const handleAddPhoto = async (orderId,photoB64) => {
    try {
      const newUrl = await uploadPhoto(photoB64,orderId);
      const {data} = await sb.from("orders").select("photo_url").eq("order_id",orderId).single();
      const combined = (data?.photo_url||"") ? (data.photo_url+"|"+newUrl) : newUrl;
      const {error} = await sb.from("orders").update({photo_url:combined,tgl_update:new Date().toISOString()}).eq("order_id",orderId);
      if(error) throw error;
      await fetchOrders(); setSelected(prev=>prev?{...prev,photoUrl:combined}:null);
    } catch(e) { alert("Error: "+e.message); }
  };

  if(!role) return <LoginScreen onLogin={saveRole} />;

  return (
    <div style={{ position:"fixed", inset:0, display:"flex", flexDirection:"column", background:"#f0f4f8", overflow:"hidden" }}>

      {/* Header */}
      <div style={{ background: ROLES[role]?.color || "#0d6b62", color:"#fff",
        flexShrink:0, zIndex:200, boxShadow:"0 2px 10px rgba(0,0,0,.2)" }}>
        <div style={{ display:"flex", alignItems:"center", padding:"12px 18px", position:"relative", minHeight:56 }}>

            </div>
          </div>

      </div>

{/* Error banner — inline, tidak popup */}

      )}

          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Cari nama customer, jenis vermak..."
            style={{ width:"100%", padding:"9px 36px", border:"1.5px solid #e2e8f0",
              borderRadius:10, fontSize:13, outline:"none", boxSizing:"border-box", background:"#f8fafc" }}
          />
          {search && (
            <button onClick={() => setSearch("")} style={{ position:"absolute", right:10, top:"50%",
              transform:"translateY(-50%)", background:"none", border:"none", color:"#94a3b8",
              cursor:"pointer", fontSize:16, lineHeight:1 }}>✕</button>
          )}
        </div>
      </div>

      {refreshing && orders.length===0
        ? <div style={{ textAlign:"center", padding:"60px 0", color:"#94a3b8" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>⏳</div>
            <div style={{ fontWeight:600 }}>Memuat data...</div>
          </div>
        : <KanbanBoard orders={orders} onCardClick={setSelected} search={search} />
      }
      {/* FAB - hanya owner & PIC Vermak */}
      {canAddOrder(role) && (
        <button className="fab" onClick={() => setShowAdd(true)}>+</button>
      )}

      {showAdd   && <AddModal    onClose={()=>setShowAdd(false)}  onSubmit={handleAdd}         saving={saving}   />}
      {selected  && <DetailModal order={selected} onClose={()=>setSelected(null)} onUpdateStage={handleUpdateStage} onUpdateCatatan={handleUpdateCatatan} onUpdateUkuran={handleUpdateUkuran} onUpdatePercepatan={handleUpdatePercepatan} onAddPhoto={handleAddPhoto} onDeletePhoto={handleDeletePhoto} onUpdateCustomerName={handleUpdateCustomerName} updating={updating} role={role} />}
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} onResetUrl={() => { saveRole(null); setShowSettings(false); }} />}
      {showArchive  && <ArchiveModal onClose={() => setShowArchive(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
