<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; min-height: 100vh; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input, select, textarea, button { font-family: inherit; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
  .sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; padding: 20px 18px 40px; max-height: 92vh; overflow-y: auto; }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .btn-primary { width: 100%; padding: 14px; background: #0d6b62; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .field-label { font-size: 13px; font-weight: 600; color: #475569; display: block; margin-bottom: 6px; }
  .field-input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color .15s; background: #fff; }
  .field-input:focus { border-color: #0d6b62; }
  .card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; border: 1px solid #f1f5f9; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: transform .15s, box-shadow .15s; }
  .card:active { transform: scale(0.98); }
  .fab { position: fixed; bottom: 24px; right: 18px; width: 56px; height: 56px; border-radius: 50%; background: #0d6b62; color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(13,107,98,0.45); display: flex; align-items: center; justify-content: center; z-index: 300; line-height: 1; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STAGES = [
  { id: "masuk",     label: "Paket Masuk",  short: "Masuk",   emoji: "\uD83D\uDCE6", color: "#64748b", bg: "#f1f5f9" },
  { id: "formulasi", label: "Formulasi",    short: "Formula", emoji: "\uD83D\uDCCF", color: "#2563eb", bg: "#eff6ff" },
  { id: "dedel",     label: "Dedel",        short: "Dedel",   emoji: "\u2702\uFE0F", color: "#ea580c", bg: "#fff7ed" },
  { id: "jahit",     label: "Proses Jahit", short: "Jahit",   emoji: "\uD83E\uDDF5", color: "#7c3aed", bg: "#f5f3ff" },
  { id: "kirim",     label: "Dikirim",      short: "Kirim",   emoji: "\uD83D\uDE9A", color: "#0891b2", bg: "#ecfeff" },
  { id: "selesai",   label: "Selesai",      short: "Selesai", emoji: "\u2705",        color: "#059669", bg: "#f0fdf4" },
];

// Handle legacy stage id "cek_ukur" from old sheet data
function normalizeStage(s) { return s === "cek_ukur" ? "formulasi" : (s||"masuk"); }

const ROLES = {
  owner:      { id:"owner",      label:"Owner",       emoji:"👑", color:"#7c3aed", pinRequired:true  },
  pic_vermak: { id:"pic_vermak", label:"PIC Vermak",  emoji:"📋", color:"#0d6b62", pinRequired:true  },
  formulator: { id:"formulator", label:"Formulator",  emoji:"📐", color:"#2563eb", pinRequired:false },
  penjahit:   { id:"penjahit",   label:"Penjahit",    emoji:"🧵", color:"#ea580c", pinRequired:false },
  kurir:      { id:"kurir",      label:"Kurir",       emoji:"🚚", color:"#0891b2", pinRequired:false },
  viewer:     { id:"viewer",     label:"Viewer",      emoji:"👁️", color:"#64748b", pinRequired:false },
};

// Hak akses per role
function canAddOrder(role)    { return role==="owner" || role==="pic_vermak"; }
function canAddPhoto(role)    { return role==="owner" || role==="pic_vermak"; }
function canEditCatatan(role, stage) {
  if (role==="owner" || role==="pic_vermak") return true;
  if (role==="formulator") return stage==="formulasi" || stage==="cek_ukur";
  return false;
}
function canEditUkuran(role, stage) {
  if (role==="owner" || role==="pic_vermak") return true;
  if (role==="formulator") return stage==="formulasi" || stage==="cek_ukur";
  return false;
}
function canAdvanceStage(role, stage) {
  if (role==="owner" || role==="pic_vermak") return true;
  if (role==="formulator") return stage==="formulasi" || stage==="cek_ukur"; // lanjut ke dedel
  if (role==="penjahit")   return stage==="jahit";
  if (role==="kurir")      return stage==="kirim";
  return false;
}

const JENIS_PAKAIAN = ["Gamis","Kemeja","Celana","Rok","Blazer","Kaftan","Abaya","Lainnya"];
const JENIS_VERMAK  = ["Potong Panjang","Kecilkan Pinggang","Kecilkan Badan","Besarkan","Tambah Kancing","Tambah Resleting","Perbaikan Jahitan","Potong Lengan","Lainnya"];

const GAS_CODE = `// ============================================================
// GOOGLE APPS SCRIPT — Vermak Tracker Backend  v3
// CARA SETUP:
// 1. Buka Google Sheets, Extensions > Apps Script
// 2. Hapus kode lama, paste kode ini
// 3. Jalankan initSheet() sekali (▶ Run) → Allow jika diminta
// 4. Deploy > New deployment > Web app
//    Execute as: Me | Who has access: Anyone
// 5. Copy URL, paste ke web app
//
// Sudah punya data sebelumnya? Jalankan updateHeaders() saja
// ============================================================

const SHEET_NAME         = "Vermak";
const ARCHIVE_SHEET_NAME = "Arsip";
const FOLDER_NAME        = "Vermak_Photos";
const ARCHIVE_DAYS       = 7; // order selesai > 7 hari → otomatis arsip

// Nama kolom yang tampil di Google Sheets (bisa diubah bebas)
const HEADERS = [
  "No. Order",
  "Nama Customer",
  "Jenis Pakaian",
  "Jenis Vermak",
  "Catatan",
  "Status Tahap",
  "Tgl. Masuk",
  "Tgl. Update",
  "Link Foto",
  "Ukuran",
];

function getOrCreateSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sh = ss.getSheetByName(SHEET_NAME);
  if (!sh) {
    sh = ss.insertSheet(SHEET_NAME);
    _writeHeaders(sh);
  }
  return sh;
}

function getOrCreateArchiveSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sh = ss.getSheetByName(ARCHIVE_SHEET_NAME);
  if (!sh) {
    sh = ss.insertSheet(ARCHIVE_SHEET_NAME);
    const heads = ["No. Order","Nama Customer","Jenis Pakaian","Jenis Vermak",
                   "Catatan","Status Tahap","Tgl. Masuk","Tgl. Update","Link Foto","Ukuran","Tgl. Arsip"];
    sh.getRange(1,1,1,heads.length).setValues([heads])
      .setFontWeight("bold").setBackground("#7c3aed").setFontColor("#fff");
    sh.setFrozenRows(1);
  }
  return sh;
}

// Dipanggil otomatis (trigger harian) atau manual
function archiveCompleted() {
  const main    = getOrCreateSheet();
  const archive = getOrCreateArchiveSheet();
  const vals    = main.getDataRange().getValues();
  const now     = new Date();
  const cutoff  = ARCHIVE_DAYS * 24 * 60 * 60 * 1000;
  const toDelete = [];

  for (let i = vals.length - 1; i >= 1; i--) {
    if (!vals[i][0]) continue;
    if (vals[i][5] !== "selesai") continue;
    const updatedAt = vals[i][7];
    const updated   = updatedAt instanceof Date ? updatedAt : new Date(Number(updatedAt));
    if (isNaN(updated.getTime())) continue;
    if ((now - updated) < cutoff) continue;

    // Tambah ke Arsip
    const row = [...vals[i], now]; // append Tgl. Arsip
    archive.appendRow(row);
    // Format tanggal di arsip
    const newRow = archive.getLastRow();
    const fmt    = "dd MMM yyyy, HH:mm";
    archive.getRange(newRow,7).setNumberFormat(fmt);
    archive.getRange(newRow,8).setNumberFormat(fmt);
    archive.getRange(newRow,11).setNumberFormat(fmt);
    archive.getRange(newRow,10).setBackground("#ede9fe");
    // Copy rich text foto jika ada
    try {
      const rt = main.getRange(i+1,9).getRichTextValue();
      if (rt) archive.getRange(newRow,9).setRichTextValue(rt);
    } catch(e){}

    toDelete.push(i+1);
  }

  // Hapus dari sheet utama (dari bawah ke atas)
  toDelete.sort((a,b)=>b-a).forEach(r => main.deleteRow(r));
  SpreadsheetApp.flush();
  Logger.log("archiveCompleted: " + toDelete.length + " order diarsipkan.");
  return toDelete.length;
}

// Jalankan sekali untuk setup trigger harian otomatis jam 02.00
function setupAutoArchive() {
  // Hapus trigger lama kalau ada
  ScriptApp.getProjectTriggers()
    .filter(t => t.getHandlerFunction() === "archiveCompleted")
    .forEach(t => ScriptApp.deleteTrigger(t));
  // Buat trigger baru
  ScriptApp.newTrigger("archiveCompleted")
    .timeBased().everyDays(1).atHour(2).create();
  Logger.log("Auto-archive trigger berhasil dibuat! Berjalan setiap hari jam 02.00.");
}

function _writeHeaders(sh) {
  const lastRow = sh.getLastRow();

  // Header row styling
  const range = sh.getRange(1, 1, 1, HEADERS.length);
  range.setValues([HEADERS]);
  range.setFontWeight("bold")
       .setBackground("#0d6b62")
       .setFontColor("#ffffff")
       .setHorizontalAlignment("center");
  sh.setFrozenRows(1);

  // Kolom Ukuran (J = kolom 10) → background biru muda
  if (lastRow > 1) {
    sh.getRange(2, 10, lastRow - 1, 1).setBackground("#dbeafe");
  }
  // Set default bg biru untuk kolom J (baris kosong ke bawah)
  sh.getRange(2, 10, 200, 1).setBackground("#dbeafe");

  // Kolom Tgl. Masuk (G=7) & Tgl. Update (H=8) → format tanggal
  const dateFmt = "dd MMM yyyy, HH:mm";
  if (lastRow > 1) {
    sh.getRange(2, 7, lastRow - 1, 1).setNumberFormat(dateFmt);
    sh.getRange(2, 8, lastRow - 1, 1).setNumberFormat(dateFmt);
  }
  sh.getRange(2, 7, 200, 1).setNumberFormat(dateFmt);
  sh.getRange(2, 8, 200, 1).setNumberFormat(dateFmt);

  // Auto-resize kolom
  for (let i = 1; i <= HEADERS.length; i++) sh.autoResizeColumn(i);
}

// Jalankan ini kalau hanya ingin update nama kolom (data tidak hilang)
function updateHeaders() {
  const sh = getOrCreateSheet();
  _writeHeaders(sh);
  SpreadsheetApp.flush();
  Logger.log("Header berhasil diperbarui!");
}

// Mapping posisi kolom → key internal (JANGAN diubah)
function rowToOrder(row) {
  return {
    orderId:      row[0],
    customerName: row[1],
    jenisPakaian: row[2],
    jenisVermak:  row[3],
    catatan:      row[4],
    stage:        row[5],
    createdAt:    row[6],
    updatedAt:    row[7],
    photoUrl:     row[8],
    ukuran:       row[9] || "",
  };
}

function doGet(e) {
  try {
    // Support ?type=archive untuk fetch data arsip
    if (e && e.parameter && e.parameter.type === "archive") {
      const arch  = getOrCreateArchiveSheet();
      const data  = arch.getDataRange().getValues();
      const rtV   = arch.getDataRange().getRichTextValues();
      if (data.length < 2) return out({ orders: [] });
      const heads = data[0];
      const orders = data.slice(1).filter(r=>r[0]).map((row,i) => {
        const obj = {};
        heads.forEach((h,j) => obj[h] = row[j]);
        // Map ke field standar
        const o = {
          orderId: obj["No. Order"], customerName: obj["Nama Customer"],
          jenisPakaian: obj["Jenis Pakaian"], jenisVermak: obj["Jenis Vermak"],
          catatan: obj["Catatan"], stage: "selesai",
          createdAt: obj["Tgl. Masuk"], updatedAt: obj["Tgl. Update"],
          photoUrl: obj["Link Foto"]||"", ukuran: obj["Ukuran"]||"",
          archivedAt: obj["Tgl. Arsip"]
        };
        try {
          const rt = rtV[i+1][8];
          if (rt) { const urls = rt.getRuns().map(r=>r.getLinkUrl()).filter(Boolean); if(urls.length) o.photoUrl = urls.join("|"); }
        } catch(ex){}
        return o;
      });
      return out({ orders });
    }

    const sheet   = getOrCreateSheet();
    const range   = sheet.getDataRange();
    const data    = range.getValues();
    const rtVals  = range.getRichTextValues();
    if (data.length < 2) return out({ orders: [] });

    const orders = data.slice(1).filter(r => r[0]).map((row, i) => {
      const order = rowToOrder(row);
      // Baca URL foto dari rich text (karena disimpan sebagai hyperlink)
      try {
        const rt = rtVals[i + 1][8]; // kolom I = index 8
        if (rt) {
          const urls = rt.getRuns()
            .map(run => run.getLinkUrl())
            .filter(Boolean);
          if (urls.length > 0) order.photoUrl = urls.join("|");
        }
      } catch(rtErr) { /* fallback ke nilai biasa */ }
      return order;
    });
    return out({ orders });
  } catch(err) { return out({ error: err.toString() }); }
}

function doPost(e) {
  try {
    const d     = JSON.parse(e.postData.contents);
    const sheet = getOrCreateSheet();

    if (d.action === "add") {
      let photoUrl = "";
      if (d.photo) {
        try {
          const fIter  = DriveApp.getFoldersByName(FOLDER_NAME);
          const folder = fIter.hasNext() ? fIter.next() : DriveApp.createFolder(FOLDER_NAME);
          const bytes  = Utilities.base64Decode(d.photo);
          const blob   = Utilities.newBlob(bytes, "image/jpeg", "vmk_"+Date.now()+".jpg");
          const file   = folder.createFile(blob);
          file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
          photoUrl = "https://lh3.googleusercontent.com/d/" + file.getId();
        } catch(photoErr) {
          Logger.log("Photo upload error: " + photoErr.toString());
        }
      }
      const orderId = "VMK-" + Date.now();
      const now     = new Date();
      sheet.appendRow([orderId, d.customerName, d.jenisPakaian, d.jenisVermak,
                       d.catatan||"", "masuk", now, now, photoUrl, ""]);
      // Apply date format, blue bg, dan rapihkan link foto
      const newRow = sheet.getLastRow();
      const dateFmt = "dd MMM yyyy, HH:mm";
      sheet.getRange(newRow, 7).setNumberFormat(dateFmt);
      sheet.getRange(newRow, 8).setNumberFormat(dateFmt);
      sheet.getRange(newRow, 10).setBackground("#dbeafe");
      if (photoUrl) setPhotoCell(sheet, newRow, photoUrl);
      SpreadsheetApp.flush();
      return out({ success: true, orderId });
    }

    if (d.action === "update_stage") {
      const vals = sheet.getDataRange().getValues();
      for (let i = 1; i < vals.length; i++) {
        if (String(vals[i][0]) === String(d.orderId)) {
          sheet.getRange(i+1, 6).setValue(d.newStage);   // kolom F = Status Tahap
          sheet.getRange(i+1, 8).setValue(new Date());   // kolom H = Tgl. Update
          SpreadsheetApp.flush();
          return out({ success: true });
        }
      }
      return out({ error: "Order tidak ditemukan: " + d.orderId });
    }

    if (d.action === "add_photo") {
      let photoUrl = "";
      try {
        const fIter  = DriveApp.getFoldersByName(FOLDER_NAME);
        const folder = fIter.hasNext() ? fIter.next() : DriveApp.createFolder(FOLDER_NAME);
        const bytes  = Utilities.base64Decode(d.photo);
        const blob   = Utilities.newBlob(bytes, "image/jpeg", "vmk_extra_"+Date.now()+".jpg");
        const file   = folder.createFile(blob);
        file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
        photoUrl = "https://lh3.googleusercontent.com/d/" + file.getId();
      } catch(photoErr) {
        return out({ error: "Gagal upload foto: " + photoErr.toString() });
      }
      const vals = sheet.getDataRange().getValues();
      for (let i = 1; i < vals.length; i++) {
        if (String(vals[i][0]) === String(d.orderId)) {
          const existing = vals[i][8] ? vals[i][8] + "|" + photoUrl : photoUrl;
          sheet.getRange(i+1, 8).setValue(new Date());
          SpreadsheetApp.flush();
          setPhotoCell(sheet, i+1, existing);  // rapihkan tampilan URL
          SpreadsheetApp.flush();
          return out({ success: true, photoUrl });
        }
      }
      return out({ error: "Order tidak ditemukan" });
    }

    if (d.action === "update_catatan") {
      const vals = sheet.getDataRange().getValues();
      for (let i = 1; i < vals.length; i++) {
        if (String(vals[i][0]) === String(d.orderId)) {
          sheet.getRange(i+1, 5).setValue(d.catatan);   // kolom E = Catatan
          sheet.getRange(i+1, 8).setValue(new Date());   // kolom H = Tgl. Update
          SpreadsheetApp.flush();
          return out({ success: true });
        }
      }
      return out({ error: "Order tidak ditemukan: " + d.orderId });
    }

    if (d.action === "update_ukuran") {
      const vals = sheet.getDataRange().getValues();
      for (let i = 1; i < vals.length; i++) {
        if (String(vals[i][0]) === String(d.orderId)) {
          sheet.getRange(i+1, 10).setValue(d.ukuran);   // kolom J = Ukuran
          sheet.getRange(i+1,  8).setValue(new Date());  // kolom H = Tgl. Update
          SpreadsheetApp.flush();
          return out({ success: true });
        }
      }
      return out({ error: "Order tidak ditemukan: " + d.orderId });
    }

    if (d.action === "manual_archive") {
      const count = archiveCompleted();
      return out({ success: true, count });
    }

    return out({ error: "Unknown action: " + d.action });
  } catch(err) { return out({ error: err.toString() }); }
}

function out(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

// Tampilkan URL foto sebagai label "Foto 1", "Foto 2" yang bisa diklik
function setPhotoCell(sheet, row, photoUrlString) {
  if (!photoUrlString) return;
  const urls = photoUrlString.split("|").map(u => u.trim()).filter(Boolean);
  if (urls.length === 0) return;

  const builder = SpreadsheetApp.newRichTextValue();
  let fullText = "";
  const links = [];

  urls.forEach((url, i) => {
    const label = "Foto " + (i + 1);
    if (i > 0) fullText += "\n";
    const start = fullText.length;
    fullText += label;
    links.push({ start, end: fullText.length, url });
  });

  builder.setText(fullText);
  links.forEach(l => builder.setLinkUrl(l.start, l.end, l.url));
  sheet.getRange(row, 9).setRichTextValue(builder.build());
}

function initSheet() {
  const sh = getOrCreateSheet();
  _writeHeaders(sh);
  // Test tulis & hapus untuk verifikasi izin
  sh.appendRow(["TEST","TEST","TEST","TEST","TEST","masuk",new Date(),new Date(),"",""]);
  sh.deleteRow(sh.getLastRow());
  SpreadsheetApp.flush();
  Logger.log("initSheet BERHASIL! Sheet siap digunakan.");
}

// Jalankan ini SEKALI untuk ganti nama stage "cek_ukur" → "formulasi" di sheet
function fixStageNames() {
  const sh   = getOrCreateSheet();
  const vals = sh.getDataRange().getValues();
  let count  = 0;
  for (let i = 1; i < vals.length; i++) {
    if (vals[i][5] === "cek_ukur") {
      sh.getRange(i+1, 6).setValue("formulasi");
      count++;
    }
  }
  SpreadsheetApp.flush();
  Logger.log("fixStageNames selesai! " + count + " baris diperbarui.");
}

// Jalankan ini SEKALI untuk perbaiki data lama yang tanggalnya masih angka
function fixExistingDates() {
  const sh = getOrCreateSheet();
  const vals = sh.getDataRange().getValues();
  const dateFmt = "dd MMM yyyy, HH:mm";
  for (let i = 1; i < vals.length; i++) {
    if (!vals[i][0]) continue;
    // Kolom G (Tgl. Masuk) dan H (Tgl. Update) — konversi timestamp ke Date
    [7, 8].forEach(col => {
      const val = vals[i][col - 1];
      if (val && typeof val === "number") {
        const d = new Date(val);
        sh.getRange(i+1, col).setValue(d).setNumberFormat(dateFmt);
      }
    });
    // Kolom J biru muda
    sh.getRange(i+1, 10).setBackground("#dbeafe");
    // Rapihkan Link Foto
    const photoVal = vals[i][8];
    if (photoVal) setPhotoCell(sh, i+1, String(photoVal));
  }
  SpreadsheetApp.flush();
  Logger.log("fixExistingDates SELESAI! " + (vals.length-1) + " baris diproses.");
}`;

// Parse multi-photo: stored as URL1|URL2|URL3
function getPhotos(photoUrl) {
  if (!photoUrl) return [];
  return String(photoUrl).split("|").map(s => s.trim()).filter(Boolean);
}

function formatDate(ts) {
  if (!ts) return "-";
  const d = (ts instanceof Date) ? ts : (isNaN(Number(ts)) ? new Date(ts) : new Date(Number(ts)));
  if (!d || isNaN(d.getTime())) return "-";
  return d.toLocaleDateString("id-ID",
    { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
}

/* ── Setup Screen ── */
/* ── PIN Numpad ── */
function PinModal({ roleId, onSuccess, onCancel }) {
  const role = ROLES[roleId];
  const [pin, setPin] = useState("");
  const [shake, setShake] = useState(false);

  const PIN_MAX = 6;
  const getStored = () => { try { return localStorage.getItem("vt_pin_"+roleId) || (roleId==="owner" ? "052731" : "1234"); } catch{return "1234";} };
  const tryPin = (p) => {
    const stored = getStored();
    if (p === stored) { onSuccess(); return; }
    if (p.length >= PIN_MAX || p.length >= stored.length) {
      setShake(true); setPin(""); setTimeout(() => setShake(false), 500);
    }
  };
  const press = d => {
    if (pin.length >= PIN_MAX) return;
    const np = pin + d;
    setPin(np);
    const stored = getStored();
    if (np === stored) { setTimeout(() => onSuccess(), 150); }
    else if (np.length >= Math.max(PIN_MAX, stored.length)) { setTimeout(() => tryPin(np), 150); }
  };
  const del = () => setPin(p => p.slice(0,-1));

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onCancel()}>
      <div className="sheet" style={{ textAlign:"center" }}>
        <div style={{ fontSize:28, marginBottom:4 }}>{role.emoji}</div>

function AddModal({ onClose, onSubmit, saving }) {

  const [photoB64, setPhotoB64]   = useState(null);
  const [preview, setPreview]     = useState(null);
  const fileRef    = useRef();
  const galleryRef = useRef();
  const set = (k,v) => setForm(p => ({...p,[k]:v}));

  const handlePhoto = e => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 800; // lebih kecil = upload lebih cepat
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w>h){ h=Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const dataUrl = canvas.toDataURL("image/jpeg",.65); // quality lebih rendah = file lebih kecil
      setPreview(dataUrl);
      setPhotoB64(dataUrl.split(",")[1]);
    };
    img.src = URL.createObjectURL(file);
  };

  const submit = () => {
    if (!form.customerName.trim()) { alert("Nama customer wajib diisi!"); return; }
    onSubmit({ ...form, photo: photoB64 });

    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>

          {preview ? (
            <div style={{ position:"relative" }}>
              <img src={preview} alt="" style={{ width:"100%", height:190, objectFit:"cover", borderRadius:12, border:"1.5px solid #e2e8f0" }} />
              <button onClick={() => { setPhotoB64(null); setPreview(null); fileRef.current.value=""; galleryRef.current.value=""; }}
                style={{ position:"absolute", top:8, right:8, background:"rgba(0,0,0,.55)", color:"#fff",

/* ── Photo Lightbox ── */
function PhotoLightbox({ photos, startIndex, onClose }) {
  const [idx, setIdx]     = useState(startIndex || 0);
  const [scale, setScale] = useState(1);
  const [pos, setPos]     = useState({ x:0, y:0 });
  const lastTap  = useRef(0);
  const lastDist = useRef(null);
  const dragStart= useRef(null);

  const reset = () => { setScale(1); setPos({ x:0, y:0 }); };
  const go    = (n) => { setIdx(n); reset(); };

  // Double-tap to zoom
  const onTouchEnd = e => {
    const now = Date.now();
    if (now - lastTap.current < 280) {
      setScale(s => s > 1 ? 1 : 2.5);
      setPos({ x:0, y:0 });
    }
    lastTap.current = now;
    lastDist.current = null;
  };

  // Pinch zoom
  const onTouchMove = e => {
    if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (lastDist.current) {
        const delta = d - lastDist.current;
        setScale(s => Math.min(5, Math.max(1, s + delta * 0.01)));
      }
      lastDist.current = d;
      e.preventDefault();
    } else if (e.touches.length === 1 && scale > 1) {
      if (dragStart.current) {
        setPos(p => ({
          x: p.x + e.touches[0].clientX - dragStart.current.x,
          y: p.y + e.touches[0].clientY - dragStart.current.y,
        }));
      }
      dragStart.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      e.preventDefault();
    }
  };

  const onTouchStart = e => {
    if (e.touches.length === 1) dragStart.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.95)", zIndex:1000,
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>

      {/* Header */}
      <div style={{ position:"absolute", top:0, left:0, right:0, display:"flex", justifyContent:"space-between",
        alignItems:"center", padding:"14px 16px", background:"rgba(0,0,0,.4)", zIndex:10 }}>
        <div style={{ color:"#fff", fontSize:13, fontWeight:600 }}>
          {idx===0 ? "📦 Foto Paket" : `📷 Foto ${idx+1}`}
          <span style={{ opacity:.5, marginLeft:8 }}>{idx+1} / {photos.length}</span>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          {scale > 1 && (
            <button onClick={reset} style={{ background:"rgba(255,255,255,.15)", border:"none",
              borderRadius:8, padding:"6px 12px", color:"#fff", cursor:"pointer", fontSize:12 }}>
              Reset Zoom
            </button>
          )}
          <button onClick={onClose} style={{ background:"rgba(255,255,255,.15)", border:"none",
            borderRadius:8, padding:"6px 12px", color:"#fff", cursor:"pointer", fontSize:18, lineHeight:1 }}>✕</button>
        </div>
      </div>

      {/* Image */}
      <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center",
        width:"100%", overflow:"hidden", touchAction:"none" }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        <img src={photos[idx]} alt="" style={{
          maxWidth:"100%", maxHeight:"85vh", objectFit:"contain",
          transform: `scale(${scale}) translate(${pos.x/scale}px, ${pos.y/scale}px)`,
          transition: scale===1 ? "transform .2s" : "none",
          userSelect:"none", touchAction:"none",
        }} draggable={false} />
      </div>

      {/* Nav arrows */}
      {photos.length > 1 && (
        <div style={{ position:"absolute", bottom:24, display:"flex", gap:12, alignItems:"center" }}>
          <button onClick={() => go((idx-1+photos.length)%photos.length)}
            disabled={photos.length < 2}
            style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:"50%",
              width:44, height:44, color:"#fff", fontSize:20, cursor:"pointer", display:"flex",
              alignItems:"center", justifyContent:"center" }}>‹</button>
          <div style={{ display:"flex", gap:6 }}>
            {photos.map((_,i) => (
              <div key={i} onClick={() => go(i)} style={{ width:8, height:8, borderRadius:"50%",
                background: i===idx ? "#fff" : "rgba(255,255,255,.4)", cursor:"pointer" }} />
            ))}
          </div>
          <button onClick={() => go((idx+1)%photos.length)}
            style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:"50%",
              width:44, height:44, color:"#fff", fontSize:20, cursor:"pointer", display:"flex",
              alignItems:"center", justifyContent:"center" }}>›</button>
        </div>
      )}

      {/* Hint */}
      <div style={{ position:"absolute", bottom: photos.length>1 ? 76 : 24, color:"rgba(255,255,255,.35)", fontSize:11 }}>
        Double tap untuk zoom · Pinch untuk zoom · Geser untuk pan
      </div>
    </div>
  );
}

      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w>h){ h=Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const b64 = canvas.toDataURL("image/jpeg",.65).split(",")[1];
      setUploadingPhoto(true);
      await onAddPhoto(order.orderId, b64);
      setUploadingPhoto(false);
      addPhotoRef.current.value = "";
      if (addGalleryRef.current) addGalleryRef.current.value = "";
    };
    img.src = URL.createObjectURL(file);
  };

  const submitCatatan = async () => {
    setSavingCatatan(true);
    await onUpdateCatatan(order.orderId, catatanVal);
    setSavingCatatan(false);
    setEditingCatatan(false);
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="sheet">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>

          <button onClick={onClose} style={{ background:"#f1f5f9", border:"none", borderRadius:8, padding:"6px 12px", cursor:"pointer", color:"#64748b", fontSize:15 }}>✕</button>
        </div>

        {/* Photo Gallery */}
        {(() => {

                        height: photos.length===1 ? 200 : 130, objectFit:"cover",
                        borderRadius:12, border:"1.5px solid #f1f5f9", display:"block",

                      <div style={{ position:"absolute", bottom:5, left:6, background:"rgba(0,0,0,.5)",
                        color:"#fff", fontSize:10, fontWeight:700, borderRadius:4, padding:"2px 6px" }}>

                      </div>
                      <div style={{ position:"absolute", top:5, right:5, background:"rgba(0,0,0,.45)",
                        color:"#fff", fontSize:12, borderRadius:4, padding:"2px 5px" }}>🔍</div>
                    </div>

                </div>

              {/* Tambah Foto Button */}
              <div>
                <input ref={addPhotoRef}   type="file" accept="image/*" capture="environment" onChange={handleAddPhotoFile} style={{ display:"none" }} />
              <input ref={addGalleryRef} type="file" accept="image/*" onChange={handleAddPhotoFile} style={{ display:"none" }} />
                {canAddPhoto(role) && (
                  uploadingPhoto ? (
                    <div style={{ padding:"10px", textAlign:"center", background:"#f1f5f9", borderRadius:10,
                      fontSize:13, color:"#94a3b8", fontWeight:600 }}>⏳ Mengupload foto...</div>

        <div style={{ background:"#f8fafc", borderRadius:12, padding:"14px 16px", marginBottom:16 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            {[["Jenis Pakaian",order.jenisPakaian],["Jenis Vermak",order.jenisVermak],

            const done   = i < idx;
            const active = i === idx;

              <div key={s.id} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
                <div style={{

                  {done ? "✓" : s.emoji}

                <div style={{ flex:1 }}>

            );

        </div>

        {next && canAdvanceStage(role, order.stage) && (
          <button className="btn-primary" onClick={() => onUpdateStage(order.orderId, next.id)}
            disabled={updating} style={{ background: updating ? "#94a3b8" : next.color }}>

        )}
      </div>
      {lightbox && <PhotoLightbox photos={lightbox.photos} startIndex={lightbox.startIndex} onClose={() => setLightbox(null)} />}

  );
}

  const fetchArchive = async () => {
    setLoading(true);
    try {
      const res  = await fetch(url + "?type=archive&t=" + Date.now());
      const data = await res.json();
      if (data.orders) setOrders(data.orders.reverse()); // terbaru di atas
    } catch(e) {}
    setLoading(false);
  };

  const manualArchive = async () => {
    if (!confirm("Arsipkan semua order Selesai yang sudah lebih dari 7 hari?")) return;
    setArchiving(true);
    try {
      const res  = await fetch(url, { method:"POST", redirect:"follow", body: JSON.stringify({ action:"manual_archive" }) });
      const data = await res.json();
      if (data.success) {
        alert(data.count > 0 ? `✅ ${data.count} order berhasil diarsipkan!` : "Tidak ada order yang perlu diarsipkan saat ini.");
        await fetchArchive();
      }
    } catch(e) { alert("Error: " + e.message); }

/* ── Main App ── */
function App() {
  const [url,       setUrl]       = useState(() => { try { return localStorage.getItem("vt_url")||""; } catch{return "";} });
  const [role,      setRole]      = useState(() => { try { return localStorage.getItem("vt_role")||null; } catch{return null;} });
  const [orders,    setOrders]    = useState([]);
  const [refreshing,setRefreshing]= useState(false);
  const [filter,    setFilter]    = useState("all");
  const [showAdd,   setShowAdd]   = useState(false);
  const [selected,  setSelected]  = useState(null);
  const [saving,    setSaving]    = useState(false);
  const [updating,  setUpdating]  = useState(false);
  const [lastSync,  setLastSync]  = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showSetup,    setShowSetup]    = useState(false);
  const [showArchive,  setShowArchive]  = useState(false);
  const [search,       setSearch]       = useState("");
  const [sortAsc,      setSortAsc]      = useState(false); // false = terbaru di atas

  const saveUrl  = u => { try { localStorage.setItem("vt_url",u); } catch{} setUrl(u); };
  const saveRole = r => { try { if(r) localStorage.setItem("vt_role",r); else localStorage.removeItem("vt_role"); } catch{} setRole(r); };

  const fetchOrders = async () => {
    if (!url) return;
    setRefreshing(true);
    try {
      const res  = await fetch(url + "?t="+Date.now());
      const data = await res.json();
      if (data.orders) { setOrders(data.orders); setLastSync(new Date()); }
    } catch(e) { alert("Gagal memuat data. Periksa koneksi atau URL."); }
    finally { setRefreshing(false); }
  };

  useEffect(() => {
    if (!url || !role) return;
    fetchOrders();
    const interval = setInterval(fetchOrders, 30000); // auto-refresh tiap 30 detik
    return () => clearInterval(interval);
  }, [url, role]);

  const postGAS = async (payload) => {
    const res = await fetch(url, { method:"POST", redirect:"follow", body: JSON.stringify(payload) });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch(e) { throw new Error("Response bukan JSON. Cek deployment Apps Script.\n" + text.substring(0,300)); }
  };

  const handleAdd = async fd => {
    setSaving(true);
    const { photo, ...orderData } = fd;
    try {
      // Step 1: Simpan order TANPA foto — instan
      const data = await postGAS({ action:"add", ...orderData, photo: null });
      if (!data.success) {
        alert("Gagal menyimpan!\n\nDetail: " + (data.error||"Tidak ada pesan error"));
        setSaving(false);
        return;
      }
      // Step 2: Tutup modal & refresh — user langsung lihat order baru
      await fetchOrders();
      setShowAdd(false);
      setSaving(false);
      // Step 3: Upload foto di background — tidak blok UI
      if (photo && data.orderId) {
        postGAS({ action:"add_photo", orderId: data.orderId, photo })
          .then(async r => { if (r.success) await fetchOrders(); })
          .catch(() => {});
      }
    } catch(e) {
      alert("Error: " + e.message);
      setSaving(false);
    }
  };

  const handleUpdateStage = async (orderId, newStage) => {
    setUpdating(true);
    try {
      const data = await postGAS({ action:"update_stage", orderId, newStage });
      if (data.success) { await fetchOrders(); setSelected(null); }
      else alert("Gagal update!\n\nDetail: " + (data.error||"Unknown error"));
    } catch(e) { alert("Error: " + e.message); }
    finally { setUpdating(false); }
  };

  const handleUpdateUkuran = async (orderId, ukuran) => {
    try {
      const data = await postGAS({ action:"update_ukuran", orderId, ukuran });
      if (data.success) {
        await fetchOrders();
        setSelected(prev => prev ? {...prev, ukuran} : null);
      } else alert("Gagal update ukuran: " + (data.error||"Error"));
    } catch(e) { alert("Error: " + e.message); }
  };

  const handleUpdateCatatan = async (orderId, catatan) => {
    try {
      const data = await postGAS({ action:"update_catatan", orderId, catatan });
      if (data.success) {
        await fetchOrders();
        setSelected(prev => prev ? {...prev, catatan} : null);
      } else alert("Gagal update catatan: " + (data.error||"Error"));
    } catch(e) { alert("Error: " + e.message); }
  };

  const handleAddPhoto = async (orderId, photoB64) => {
    try {
      const data = await postGAS({ action:"add_photo", orderId, photo: photoB64 });
      if (data.success) {
        await fetchOrders();
        // Update selected order photoUrl in place
        setSelected(prev => {
          if (!prev) return null;
          const existing = prev.photoUrl ? prev.photoUrl + "|" + data.photoUrl : data.photoUrl;
          return {...prev, photoUrl: existing};
        });
      } else alert("Gagal upload foto: " + (data.error||"Error"));
    } catch(e) { alert("Error: " + e.message); }
  };

  if (!url || showSetup) return <SetupScreen onSave={u => { saveUrl(u); setShowSetup(false); }} />;
  if (!role) return <LoginScreen onLogin={saveRole} onSetup={() => setShowSetup(true)} />;

  const counts   = {};
  STAGES.forEach(s => { counts[s.id] = orders.filter(o => normalizeStage(o.stage) === s.id).length; });
  const searchLower = search.toLowerCase().trim();
  const filtered = orders
    .filter(o => filter === "all" || normalizeStage(o.stage) === filter)
    .filter(o => !searchLower ||
      String(o.customerName||"").toLowerCase().includes(searchLower) ||
      String(o.jenisPakaian||"").toLowerCase().includes(searchLower) ||
      String(o.jenisVermak||"").toLowerCase().includes(searchLower) ||
      String(o.catatan||"").toLowerCase().includes(searchLower) ||
      String(o.orderId||"").toLowerCase().includes(searchLower)
    )
    .sort((a,b) => {
      const ta = Number(a.createdAt)||0, tb = Number(b.createdAt)||0;
      return sortAsc ? ta-tb : tb-ta;
    });
  const aktif    = orders.filter(o => normalizeStage(o.stage) !== "selesai").length;

  return (
    <div style={{ minHeight:"100vh", background:"#f0f4f8" }}>
      <div style={{ maxWidth:600, margin:"0 auto", position:"relative", minHeight:"100vh", background:"#f0f4f8", boxShadow:"0 0 40px rgba(0,0,0,0.08)" }}>

      {/* Header */}
      <div style={{ background: ROLES[role]?.color || "#0d6b62", color:"#fff", padding:"13px 18px",
        position:"sticky", top:0, zIndex:200, boxShadow:"0 2px 10px rgba(0,0,0,.2)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:17, fontWeight:800, letterSpacing:-.3 }}>🧵 Vermak Tracker</div>
            <div style={{ fontSize:11, opacity:.8, marginTop:1, display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ background:"rgba(255,255,255,.2)", padding:"1px 7px", borderRadius:10, fontWeight:700 }}>
                {ROLES[role]?.emoji} {ROLES[role]?.label}
              </span>
              <span style={{ opacity:.7 }}>{aktif} aktif · {counts.selesai||0} selesai{lastSync && ` · 🔄 ${lastSync.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}`}</span>
            </div>
          </div>
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={fetchOrders} disabled={refreshing}
              style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:8, padding:"8px 11px", color:"#fff", cursor:"pointer", fontSize:15 }}>
              {refreshing ? "⏳" : "🔄"}
            </button>
            {(role==="owner" || role==="pic_vermak" || role==="viewer") && (
              <button onClick={() => setShowArchive(true)} title="Lihat Arsip"
                style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:8, padding:"8px 11px", color:"#fff", cursor:"pointer", fontSize:13 }}>
                📦
              </button>
            )}
            {role==="owner" && (
              <button onClick={() => setShowSettings(true)}
                style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:8, padding:"8px 11px", color:"#fff", cursor:"pointer", fontSize:13 }}>
                ⚙️
              </button>
            )}
            <button onClick={() => { if(confirm("Logout dari role " + ROLES[role]?.label + "?")) saveRole(null); }}
              style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:8, padding:"8px 11px", color:"#fff", cursor:"pointer", fontSize:13 }}>
              🚪
            </button>
          </div>
        </div>
      </div>

      {/* Stage Counter Bar */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e2e8f0", overflowX:"auto" }}>
        <div style={{ display:"flex", padding:"8px 16px", gap:4 }}>
          {STAGES.map(s => (
            <div key={s.id} style={{ flex:1, textAlign:"center", minWidth:44 }}>
              <div style={{ fontSize:17 }}>{s.emoji}</div>
              <div style={{ fontSize:18, fontWeight:800, color: counts[s.id]>0 ? s.color : "#e2e8f0", lineHeight:1.1 }}>
                {counts[s.id]||0}
              </div>
              <div style={{ fontSize:9, color:"#94a3b8" }}>{s.short}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Filter Tabs */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e2e8f0", overflowX:"auto" }}>
        <div style={{ display:"flex", gap:4, padding:"8px 14px", whiteSpace:"nowrap" }}>
          <button onClick={() => setFilter("all")} style={{ padding:"5px 14px", borderRadius:20, border:"none",
            fontSize:12, fontWeight:600, cursor:"pointer",
            background: filter==="all" ? "#0d6b62" : "#f1f5f9",
            color: filter==="all" ? "#fff" : "#64748b" }}>
            Semua ({orders.length})
          </button>
          {STAGES.map(s => (
            <button key={s.id} onClick={() => setFilter(s.id)} style={{ padding:"5px 12px", borderRadius:20, border:"none",
              fontSize:12, fontWeight:600, cursor:"pointer", whiteSpace:"nowrap",
              background: filter===s.id ? s.color : "#f1f5f9",
              color: filter===s.id ? "#fff" : "#64748b" }}>
              {s.emoji} {s.short} {counts[s.id]>0 ? `(${counts[s.id]})` : ""}
            </button>
          ))}
        </div>
      </div>

      {/* Search + Sort */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e2e8f0", padding:"10px 14px" }}>
        <div style={{ display:"flex", gap:8 }}>
          <div style={{ flex:1, position:"relative" }}>
            <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", fontSize:15, color:"#94a3b8" }}>🔍</span>
            <input
              value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Cari nama customer, jenis vermak..."
              style={{ width:"100%", padding:"9px 36px 9px 36px", border:"1.5px solid #e2e8f0",
                borderRadius:10, fontSize:13, outline:"none", boxSizing:"border-box",
                background:"#f8fafc", color:"#1e293b" }}
            />
            {search && (
              <button onClick={() => setSearch("")} style={{ position:"absolute", right:10, top:"50%",
                transform:"translateY(-50%)", background:"none", border:"none", color:"#94a3b8",
                cursor:"pointer", fontSize:16, lineHeight:1 }}>✕</button>
            )}
          </div>
          <button onClick={() => setSortAsc(s => !s)} title={sortAsc ? "Terlama di atas" : "Terbaru di atas"}
            style={{ flexShrink:0, padding:"9px 13px", border:"1.5px solid #e2e8f0", borderRadius:10,
              background:"#f8fafc", cursor:"pointer", fontSize:14, color:"#64748b", fontWeight:600, whiteSpace:"nowrap" }}>
            {sortAsc ? "⬆ Terlama" : "⬇ Terbaru"}
          </button>
        </div>
      </div>

      {/* List */}
      <div style={{ padding:"14px 14px 100px" }}>
        {refreshing && orders.length===0 && (
          <div style={{ textAlign:"center", padding:"60px 0", color:"#94a3b8" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>⏳</div>
            <div style={{ fontWeight:600 }}>Memuat data...</div>
          </div>
        )}
        {!refreshing && filtered.length===0 && (
          <div style={{ textAlign:"center", padding:"60px 20px", color:"#94a3b8" }}>
            <div style={{ fontSize:44, marginBottom:10 }}>{search ? "🔍" : "📭"}</div>
            <div style={{ fontWeight:700, fontSize:15, color:"#64748b" }}>
              {search ? `Tidak ada hasil untuk "${search}"` : "Belum ada order"}
            </div>
            <div style={{ fontSize:13, marginTop:5 }}>
              {search ? "Coba kata kunci lain" : "Tap tombol + untuk tambah paket baru"}
            </div>
          </div>
        )}
        {filtered.map(o => <OrderCard key={o.orderId} order={o} onClick={setSelected} />)}
      </div>

      {/* FAB - hanya owner & PIC Vermak */}
      {canAddOrder(role) && (
        <button className="fab" onClick={() => setShowAdd(true)}>+</button>
      )}
      </div>

      {showAdd   && <AddModal    onClose={()=>setShowAdd(false)}  onSubmit={handleAdd}         saving={saving}   />}
      {selected  && <DetailModal order={selected} onClose={()=>setSelected(null)} onUpdateStage={handleUpdateStage} onUpdateCatatan={handleUpdateCatatan} onUpdateUkuran={handleUpdateUkuran} onAddPhoto={handleAddPhoto} updating={updating} role={role} />}
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} onResetUrl={() => { localStorage.removeItem("vt_url"); setUrl(""); saveRole(null); setShowSettings(false); setShowSetup(true); }} />}
      {showArchive  && <ArchiveModal url={url} onClose={() => setShowArchive(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
